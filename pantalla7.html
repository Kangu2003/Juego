<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardianes entre la Sierra y el Mar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-image: url('img/quinta.png') !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            background-position: center 100px !important;
        }

        .header {
            background: linear-gradient(180deg, rgba(201, 234, 245, 1) 40%, rgba(201, 234, 245, 0) 100%) !important;
            padding-bottom: 40px !important;
        }
    </style>
</head>

<body>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <div class="header">
        <div class="progress-wrap" id="progressBar"></div>
    </div>

    <div id="game">
        <div class="nav-btns"
            style="position: fixed; bottom: 20px; width: calc(100% - 60px); left: 30px; border-top: none;">
            <button class="btn btn-primary" onclick="goTo(6)">← Atrás</button>
            <div class="btn-audio" onclick="toggleAudio()" style="position: static; transform: none;">🔊</div>
            <button class="btn btn-green" onclick="goTo(8)">Siguiente →</button>
        </div>



        <script>
            const currentScreen = 7;
            const screenAudio = new Audio('audio/audio8.mp3'); // Cambia este archivo al audio correcto
            function toggleAudio() {
                if (screenAudio.paused) {
                    screenAudio.play();
                } else {
                    screenAudio.pause();
                }
            }
        </script>
        <script src="script.js"></script>
</body>

</html>
